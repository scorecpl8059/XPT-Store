version: 1
applications:
  - appRoot: frontend
    frontend:
      phases:
        preBuild:
          commands:
            - rm -rf node_modules package-lock.json
            - npm install --force --include=optional
            - npm rebuild
        build:
          commands:
            - npx next build
      artifacts:
        baseDirectory: .next
        files:
          - "**/*"
      cache:
        paths:
          - .next/cache/**/*
